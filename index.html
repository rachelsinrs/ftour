<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTour v4 - My Concert Journal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-page); 
            font-family: 'Noto Sans TC', sans-serif; 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background: var(--bg-page);
            border: 8px solid #1e293b;
            border-radius: 48px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 40px 24px 16px;
            background: white;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Nunito', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .tabs {
            display: flex;
            gap: 24px;
            margin-top: 20px;
        }

        .tab {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-sub);
            padding-bottom: 8px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 100px;
            scroll-behavior: smooth;
        }

        .stats-card {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 24px;
            border-radius: var(--radius);
            color: white;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .stats-card h3 { font-size: 14px; opacity: 0.9; font-weight: 500; }
        .stats-card .count { font-size: 40px; font-weight: 800; margin: 4px 0; }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
        }

        .concert-card {
            background: white;
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            transition: transform 0.2s;
            box-shadow: var(--shadow);
        }

        .concert-card:active { transform: scale(0.98); }

        .date-box {
            min-width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 12px;
            height: 56px;
        }

        .date-box .month { font-size: 11px; font-weight: 800; color: var(--primary); }
        .date-box .day { font-size: 20px; font-weight: 800; }

        .info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .info .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
        .info .venue { font-size: 13px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }

        .fab {
            position: absolute;
            bottom: 40px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 30px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            font-size: 28px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <header>
            <div class="logo">FTour</div>
            <div class="tabs">
                <div class="tab">未來行程</div>
                <div class="tab active">紀錄</div>
            </div>
        </header>

        <div id="app-content" class="content">
            <div class="stats-card">
                <h3>總參與場次</h3>
                <div id="total-count" class="count">--</div>
                <p style="font-size: 12px; opacity: 0.8;">資料同步自 Google Sheets</p>
            </div>

            <div id="list-container">
                <div class="loading-state">載入紀錄中...</div>
            </div>
        </div>

        <button class="fab" onclick="window.open('https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit', '_blank')">
            <i class="ti ti-plus"></i>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw5YreMxTtQyaTU6CFZhxIoi5dtknHZQhYL2Wuy023FA3vASFICJCx9u0ULiiVCG9o/exec";

        async function fetchConcerts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderList(data);
            } catch (error) {
                document.getElementById('list-container').innerHTML = '<div class="loading-state">載入失敗，請檢查網路或 API 權限</div>';
                console.error("Fetch error:", error);
            }
        }

        function renderList(items) {
            const container = document.getElementById('list-container');
            const totalDisplay = document.getElementById('total-count');
            
            // Sort by date descending
            items.sort((a, b) => new Date(b.Date) - new Date(a.Date));
            
            totalDisplay.textContent = items.length + " 場";
            container.innerHTML = "";

            items.forEach(item => {
                const dateObj = new Date(item.Date);
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const card = `
                    <div class="concert-card">
                        <div class="date-box">
                            <div class="month">${months[dateObj.getMonth()]}</div>
                            <div class="day">${dateObj.getDate()}</div>
                        </div>
                        <div class="info">
                            <div class="title">${item.Title}</div>
                            <div class="venue">
                                <i class="ti ti-map-pin"></i> ${item.Venue}
                                ${item.Note ? `<span style="margin-left:8px; opacity:0.6">| ${item.Note}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        window.onload = fetchConcerts;
    </script>
</body>
</html>
