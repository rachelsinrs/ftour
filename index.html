<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTour v5 - Concert Journal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #cbd5e1; 
            font-family: 'Noto Sans TC', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }

        .phone-container {
            width: 100%; max-width: 390px; height: 844px;
            background: var(--bg-page); border: 10px solid #1e293b; border-radius: 50px;
            overflow: hidden; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        header { padding: 45px 24px 15px; background: white; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Nunito', sans-serif; font-size: 32px; font-weight: 800; color: var(--primary); }
        
        .tabs { display: flex; gap: 20px; margin-top: 15px; }
        .tab { font-size: 14px; font-weight: 700; color: var(--text-sub); padding-bottom: 8px; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        .concert-card {
            background: white; border-radius: var(--radius); margin-bottom: 20px;
            overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* Poster Area */
        .poster-box {
            width: 100%; height: 160px; background: #e2e8f0;
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; position: relative;
        }
        .poster-overlay {
            width: 100%; height: 60%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 15px; display: flex; align-items: flex-end;
        }
        .tag-count {
            background: var(--primary); color: white; padding: 4px 10px;
            border-radius: 10px; font-size: 11px; font-weight: 700;
        }

        .details { padding: 16px; }
        .details .date-row { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .details .title { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
        .details .venue { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }

        .fab {
            position: absolute; bottom: 35px; right: 25px; width: 60px; height: 60px;
            background: var(--primary); border-radius: 30px; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            border: none; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <header>
            <div class="logo">FTour</div>
            <div class="tabs">
                <div class="tab">未來行程</div>
                <div class="tab active">紀錄</div>
            </div>
        </header>

        <div id="app-content" class="content">
            <div id="list-container">載入中...</div>
        </div>
        
        <button class="fab" onclick="window.location.reload()"><i class="ti ti-refresh"></i></button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw5YreMxTtQyaTU6CFZhxIoi5dtknHZQhYL2Wuy023FA3vASFICJCx9u0ULiiVCG9o/exec";

        // Poster Mapping (Crawl Simulation)
        // Since true crawling is blocked by CORS, we use a smart mapping based on keywords.
        const posterMap = {
            "TVXQ": "https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?auto=format&fit=crop&w=400&q=80", 
            "JAE JOONG": "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=400&q=80",
            "JX": "https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?auto=format&fit=crop&w=400&q=80",
            "U-KNOW": "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=400&q=80"
        };

        function getPoster(title) {
            const upperTitle = title.toUpperCase();
            for (let key in posterMap) {
                if (upperTitle.includes(key)) return posterMap[key];
            }
            return "https://images.unsplash.com/photo-1514525253361-bee8d48700df?auto=format&fit=crop&w=400&q=80"; // Default
        }

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('list-container');
                container.innerHTML = "";

                // Sort Descending
                data.sort((a, b) => b.Date.localeCompare(a.Date));

                data.forEach(item => {
                    const poster = getPoster(item.Title);
                    const card = `
                        <div class="concert-card">
                            <div class="poster-box" style="background-image: url('${poster}')">
                                <div class="poster-overlay">
                                    ${item.Note ? `<span class="tag-count">${item.Note}</span>` : ''}
                                </div>
                            </div>
                            <div class="details">
                                <div class="date-row">${item.Date}</div>
                                <div class="title">${item.Title}</div>
                                <div class="venue"><i class="ti ti-map-pin"></i> ${item.Venue}</div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });
            } catch (e) {
                document.getElementById('list-container').innerText = "連線失敗，請檢查 API 網址";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
